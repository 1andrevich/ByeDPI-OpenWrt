name: build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag:     ${{ steps.version.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - hufrea_arch: aarch64
            openwrt_arches: aarch64_cortex-a53 aarch64_cortex-a72 aarch64_cortex-a76 aarch64_generic
          - hufrea_arch: armv7l
            openwrt_arches: arm_cortex-a5_vfpv4 arm_cortex-a7 arm_cortex-a7_neon-vfpv4 arm_cortex-a7_vfpv4 arm_cortex-a8_vfpv3 arm_cortex-a9 arm_cortex-a9_neon arm_cortex-a9_vfpv3-d16 arm_cortex-a15_neon-vfpv4
          - hufrea_arch: armv6
            openwrt_arches: arm_arm1176jzf-s_vfp arm_arm926ej-s arm_fa526 arm_mpcore arm_xscale
          - hufrea_arch: mips
            openwrt_arches: mips_24kc mips_4kec mips_mips32
          - hufrea_arch: mipsel
            openwrt_arches: mipsel_24kc mipsel_24kc_24kf mipsel_74kc mipsel_mips32
          - hufrea_arch: x86_64
            openwrt_arches: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential fakeroot libssl-dev meson ninja-build

          git clone https://git.alpinelinux.org/apk-tools apk-tools-src
          pushd apk-tools-src
          git checkout b5a31c0d865342ad80be10d68f1bb3d3ad9b0866
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=disabled \
            -Dlua_version=disabled \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo meson install -C build --strip
          popd

          curl -fsSL "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build" \
            | sudo tee /usr/local/bin/ipkg-build > /dev/null
          sudo chmod +x /usr/local/bin/ipkg-build

      - name: Get latest byedpi version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(wget -qO- --header="Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/hufrea/byedpi/releases/latest" \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          VERSION="${TAG#v}"
          ARCHIVE_VERSION="${VERSION#0.}"
          echo "tag=$TAG"              >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "archive_ver=$ARCHIVE_VERSION" >> $GITHUB_OUTPUT

      - name: Download binary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE_VER="${{ steps.version.outputs.archive_ver }}"
          HUFREA_ARCH="${{ matrix.hufrea_arch }}"
          wget -q "https://github.com/hufrea/byedpi/releases/download/${TAG}/byedpi-${ARCHIVE_VER}-${HUFREA_ARCH}.tar.gz" \
            -O binary.tar.gz
          tar xzf binary.tar.gz
          BINARY=$(find . -name 'ciadpi*' -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: ciadpi binary not found in archive. Archive contents:"
            tar tzf binary.tar.gz
            exit 1
          fi
          chmod +x "$BINARY"
          mv "$BINARY" ./ciadpi

      - name: Setup APK signing key
        # Optional: add SIGN_PRIVATE_KEY (base64-encoded usign private key) to
        # repository secrets (Settings → Secrets → Actions) to sign APK packages.
        # Unsigned packages still install fine — signing enables repository trust.
        run: |
          if [ -n "${{ secrets.SIGN_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.SIGN_PRIVATE_KEY }}" > /tmp/sign.key
            chmod 600 /tmp/sign.key
            echo "APK_SIGN_KEY=/tmp/sign.key" >> $GITHUB_ENV
          fi

      - name: Build packages
        run: |
          bash .github/build-byedpi.sh \
            "${{ steps.version.outputs.version }}" \
            "./ciadpi" \
            "${{ matrix.openwrt_arches }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.hufrea_arch }}
          path: .github/out/
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          merge-multiple: true
          path: packages/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          body: |
            ### ByeDPI ${{ needs.build.outputs.tag }}

            Packages for all supported OpenWrt versions (19.07 → 25.12).

            -----
            Check your device architecture:
            ```
            awk -F\' '/DISTRIB_ARCH/ {print $2}' /etc/openwrt_release
            ```

            **Note:** `mips64_octeonplus` is not available (no upstream pre-built binary).
          files: |
            packages/*.ipk
            packages/*.apk
